services:
  # PostgreSQL Database with pgvector
  db:
    image: pgvector/pgvector:pg15
    container_name: maintenanceguard-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: maintenanceguard
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/migrations:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: maintenanceguard-backend
    dns:
      - 8.8.8.8
      - 8.8.4.4
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ENVIRONMENT=development
      - ADMIN_SECRET_KEY=${ADMIN_SECRET_KEY}
      - COST_ANOMALY_THRESHOLD_USD=${COST_ANOMALY_THRESHOLD_USD}
      - CLAUDE_HAIKU_INPUT_PRICE_PER_M=${CLAUDE_HAIKU_INPUT_PRICE_PER_M}
      - CLAUDE_HAIKU_OUTPUT_PRICE_PER_M=${CLAUDE_HAIKU_OUTPUT_PRICE_PER_M}
      - CLAUDE_OPUS_INPUT_PRICE_PER_M=${CLAUDE_OPUS_INPUT_PRICE_PER_M}
      - CLAUDE_OPUS_OUTPUT_PRICE_PER_M=${CLAUDE_OPUS_OUTPUT_PRICE_PER_M}
    volumes:
      - ./backend:/app
      - uploaded_invoices:/app/uploads
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: maintenanceguard-frontend
    environment:
      - VITE_API_URL=http://localhost:8000
    ports:
      - "5173:5173"
    depends_on:
      - backend
    
    command: npm install -g serve && serve -s dist -l 5173 --host

volumes:
  postgres_data:
  uploaded_invoices:

networks:
  default:
    name: maintenanceguard-network
